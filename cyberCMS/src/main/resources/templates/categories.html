<body>

    <h3>Categories</h3>
    <!-- SIDEBAR -->
    <div id="sidebar">
        <h4 class="text-center py-3">Admin Panel</h4>

        <a href="/dashboard">Dashboard</a>
        <a href="/admin/categories">Categories</a>
        <a href="/admin/best-practices">Best Practices</a>
        <a href="/admin/policies">Policies</a>
        <a href="/admin/it-services">IT Services</a>
        <a href="/admin/testimonials">Testimonials</a>
    </div>
    <div class="container mt-4">

        <!-- FORM -->
        <form action="/category/save" method="post" class="mb-3">
            <input type="text" name="name" placeholder="Category Name" required>
            <button class="btn btn-success btn-sm">Add</button>
        </form>

        <!-- TABLE -->
        <table class="table table-bordered">
            <tr>
                <th>Name</th>
                <th>Action</th>
            </tr>

            <tr th:each="c : ${categories}">
                <td th:text="${c.name}"></td>
                <td>
                    <a th:href="@{/category/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        </table>

    </div>

</body>
