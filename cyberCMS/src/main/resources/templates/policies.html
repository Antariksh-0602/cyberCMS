<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Policies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">Policies</h2>

        <!-- FORM -->
        <div class="card mb-4 shadow">
            <div class="card-header bg-primary text-white">Add / Edit Policy</div>
            <div class="card-body">

                <form action="/admin/policies/save" method="post">

                    <input type="hidden" name="id" th:value="${policy.id}" />

                    <input class="form-control mb-2" name="title" placeholder="Title" th:value="${policy.title}"
                        required>

                    <input class="form-control mb-2" name="description" placeholder="Description"
                        th:value="${policy.description}" required>

                    <button class="btn btn-success">Save</button>

                </form>

            </div>
        </div>

        <!-- TABLE -->
        <div class="card shadow">
            <div class="card-header bg-dark text-white">All Policies</div>
            <div class="card-body">

                <table class="table table-bordered">
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>

                    <tr th:each="p : ${list}">
                        <td th:text="${p.title}"></td>
                        <td th:text="${p.description}"></td>
                        <td>
                            <a th:href="@{/admin/policies/edit/{id}(id=${p.id})}"
                                class="btn btn-warning btn-sm">Edit</a>
                            <a th:href="@{/admin/policies/delete/{id}(id=${p.id})}"
                                class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>

                </table>

            </div>
        </div>

    </div>

</body>

</html>
