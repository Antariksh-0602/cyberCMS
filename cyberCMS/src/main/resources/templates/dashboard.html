<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        #sidebar {
            min-width: 250px;
            max-width: 250px;
            height: 100vh;
            position: fixed;
            background: #343a40;
            color: white;
            transition: all 0.3s;
        }

        #sidebar.collapsed {
            margin-left: -250px;
        }

        #sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
        }

        #sidebar a:hover {
            background: #495057;
        }

        #content {
            margin-left: 250px;
            transition: all 0.3s;
        }

        #content.full {
            margin-left: 0;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h4 class="text-center py-3">Admin Panel</h4>

        <a href="/admin/categories">Categories</a>
        <a href="/admin/best-practices">Best Practices</a>
        <a href="/admin/policies">Policies</a>
        <a href="/admin/it-services">IT Services</a>
        <a href="/admin/testimonials">Testimonials</a>
    </div>

    <!-- MAIN CONTENT -->
    <div id="content">

        <!-- TOP BAR -->
        <nav class="navbar navbar-light bg-light shadow-sm">
            <button class="btn btn-dark" onclick="toggleSidebar()">☰</button>
            <span class="ms-3">Dashboard</span>
        </nav>

        <div class="container mt-4">

            <h3 class="mb-4">Overview</h3>

            <!-- BEST PRACTICES -->
            <div class="mb-5">
                <h4>Best Practices</h4>
                <div class="row">
                    <div class="col-md-4 mb-3" th:each="bp : ${bestPractices}">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 th:text="${bp.title}"></h5>
                                <p th:text="${bp.description}"></p>
                                <small class="text-muted" th:text="${bp.category.name}"></small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- POLICIES -->
            <div class="mb-5">
                <h4>Policies</h4>
                <ul class="list-group">
                    <li class="list-group-item" th:each="p : ${policies}" th:text="${p.title}"></li>
                </ul>
            </div>

            <!-- IT SERVICES -->
            <div class="mb-5">
                <h4>IT Services</h4>
                <div class="row">
                    <div class="col-md-6 mb-3" th:each="s : ${services}">
                        <div class="card">
                            <div class="card-body">
                                <h5 th:text="${s.title}"></h5>
                                <p th:text="${s.description}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TESTIMONIALS -->
            <div class="mb-5">
                <h4>Testimonials</h4>
                <div class="row">
                    <div class="col-md-4" th:each="t : ${testimonials}">
                        <div class="card">
                            <div class="card-body">
                                <p th:text="${t.message}"></p>
                                <strong th:text="${t.name}"></strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("collapsed");
            document.getElementById("content").classList.toggle("full");
        }
    </script>

</body>

</html>
